<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafio Bíblico - Edição Suprema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --celestial-gold: #ffd700;
            --holy-blue: #1e3a8a;
            --hell-red: #ff4d4d;
            --divine-light: rgba(255, 215, 0, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: #020617;
            color: white;
            height: 100dvh; /* Dynamic viewport height para mobile */
            width: 100vw;
        }

        h1, h2, .font-cinzel { font-family: 'Cinzel', serif; }

        /* Camada de Neblina */
        .fog-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/fog.png');
            opacity: 0.15;
            pointer-events: none;
            z-index: 5;
            animation: moveFog 60s linear infinite;
        }

        @keyframes moveFog {
            from { background-position: 0 0; }
            to { background-position: 10000px 0; }
        }

        /* Efeito de Vinheta de Pressão */
        #vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 100;
            transition: box-shadow 0.3s ease;
        }

        /* Animações */
        .shake-screen { animation: shakeScreen 0.4s both; }
        @keyframes shakeScreen {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Personagens Mobile Friendly */
        .character-container {
            position: fixed;
            bottom: -500px; 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 60;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px; /* Reduzido para mobile */
        }

        @media (max-width: 640px) {
            .character-container { width: 180px; }
            #angel-box { right: 0; }
            #demon-box { left: 0; }
        }

        #angel-box { right: 5%; }
        #demon-box { left: 5%; }
        .character-container.active { bottom: 10px; }

        .speech-bubble {
            background: white;
            color: #0f172a;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 10px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 3px solid var(--celestial-gold);
            font-weight: 800;
            font-size: 0.85rem;
            position: relative;
        }

        #demon-text { border-color: var(--hell-red); color: #7f1d1d; }

        /* Botões de Opção */
        .btn-option {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            transition: all 0.15s ease;
            touch-action: manipulation;
        }

        .btn-option:active {
            background: rgba(30, 58, 138, 0.8);
            transform: scale(0.96);
            border-color: var(--celestial-gold);
        }

        /* HUD e Vidas */
        .life-heart {
            color: #ef4444;
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.6));
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .life-lost { transform: scale(0); opacity: 0; }

        /* Partículas */
        .floating-text {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            z-index: 100;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
        }

        .timer-danger { animation: pulseDanger 0.5s infinite; background: #ef4444 !important; }
        @keyframes pulseDanger { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .glow-gold { text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }

        /* Ocultar scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex items-center justify-center select-none overflow-hidden">

    <div id="vignette"></div>
    <div class="fog-layer"></div>
    <div id="weather-layer" class="fixed inset-0 pointer-events-none z-10"></div>
    <div id="lightning-effect" class="fixed inset-0 bg-white opacity-0 pointer-events-none z-[110]"></div>

    <div id="game-container" class="w-full max-w-2xl h-full flex flex-col justify-center px-4 py-6 z-20 overflow-y-auto">
        
        <!-- Ecrã Inicial -->
        <div id="start-screen" class="text-center animate-fade-in">
            <div class="mb-4 inline-block animate-bounce">
                <svg width="60" height="60" viewBox="0 0 100 100">
                    <path d="M50 5 L15 30 L15 85 L85 85 L85 30 Z" fill="none" stroke="#ffd700" stroke-width="4"/>
                    <path d="M30 45 L70 45 M50 30 L50 70" stroke="#ffd700" stroke-width="5"/>
                </svg>
            </div>
            <h1 class="text-5xl sm:text-7xl mb-1 text-yellow-400 glow-gold font-black uppercase tracking-tighter">Desafio Bíblico</h1>
            <p class="text-lg sm:text-xl mb-4 text-blue-300 font-cinzel tracking-[0.2em]">Chegue até o fim!</p>
            
            <div class="mb-8 font-cinzel text-[10px] tracking-widest text-yellow-600/80 font-bold">
                Desenvolvido por <span class="text-yellow-400">Esley Augusto</span>
            </div>

            <div class="flex flex-col items-center gap-4">
                <button onclick="startGame()" class="w-full max-w-xs py-5 bg-yellow-500 text-blue-950 font-black text-2xl rounded-2xl transition-all active:scale-95 shadow-[0_8px_0_rgb(161,98,7)] active:shadow-none active:translate-y-2">
                    COMEÇAR
                </button>
                <p class="text-slate-500 text-xs italic px-6">"Muitos são chamados, poucos acertam tudo."</p>
            </div>
        </div>

        <!-- Interface do Jogo -->
        <div id="game-ui" class="hidden h-full flex flex-col">
            <div class="flex justify-between items-center mb-4 sm:mb-8 pt-2">
                <div class="flex flex-col gap-2">
                    <div id="lives-container" class="flex gap-2">
                        <span class="life-heart">❤</span>
                        <span class="life-heart">❤</span>
                        <span class="life-heart">❤</span>
                    </div>
                    <div class="bg-black/40 backdrop-blur px-3 py-1 rounded-lg border border-white/10">
                        <span class="text-[8px] uppercase tracking-widest text-blue-400 block font-bold">Pontos</span>
                        <div id="score" class="text-xl sm:text-3xl font-black text-yellow-400 tabular-nums">0000</div>
                    </div>
                </div>
                
                <div class="text-right">
                    <div id="question-count" class="text-lg sm:text-2xl font-cinzel font-bold text-white">01 <span class="text-slate-500">/ 20</span></div>
                    <div class="w-24 sm:w-32 h-2 bg-slate-800 rounded-full mt-2 overflow-hidden border border-white/5">
                        <div id="progress-fill" class="h-full bg-yellow-500 transition-all duration-700"></div>
                    </div>
                </div>
            </div>

            <div id="main-card" class="bg-slate-900/60 backdrop-blur-xl rounded-[2rem] p-6 sm:p-10 border border-white/10 shadow-2xl relative flex-grow flex flex-col justify-center">
                <div id="timer-bar" class="absolute top-0 left-0 h-1.5 bg-yellow-400 transition-all duration-100 linear"></div>
                
                <h2 id="question-text" class="text-xl sm:text-3xl mb-6 sm:mb-10 text-center font-black text-white leading-snug"></h2>
                
                <div id="options-grid" class="grid grid-cols-1 gap-3 sm:gap-4">
                    <!-- Botões injetados aqui -->
                </div>
            </div>

            <div id="combo-badge" class="mt-4 flex justify-center opacity-0 scale-50 transition-all duration-500">
                <div class="bg-blue-950 px-6 py-2 rounded-full border border-orange-500/50">
                    <span class="text-white font-black text-sm italic uppercase">Combo <span class="text-yellow-400" id="combo-val">0</span>x</span>
                </div>
            </div>
        </div>

        <!-- Ecrã Final -->
        <div id="end-screen" class="hidden text-center bg-slate-900/90 p-8 sm:p-12 rounded-[3rem] border-2 border-yellow-500/30">
            <div id="end-icon" class="text-6xl mb-4">🏆</div>
            <h2 id="end-title" class="text-4xl sm:text-6xl mb-2 font-black uppercase text-yellow-400">Fim da Prova</h2>
            <p id="final-message" class="text-blue-200 mb-6 text-sm sm:text-lg italic px-4"></p>
            <div class="text-6xl sm:text-8xl font-black mb-6 text-white" id="final-score">0</div>
            
            <div class="mb-8 text-[10px] tracking-widest text-yellow-600/60 font-bold uppercase">
                Criado por <span class="text-yellow-400">Esley Augusto</span>
            </div>

            <button onclick="location.reload()" class="w-full max-w-xs py-4 bg-white text-blue-950 rounded-xl font-black text-xl active:scale-95">RECOMEÇAR</button>
        </div>
    </div>

    <!-- Personagens -->
    <div id="angel-box" class="character-container">
        <div class="speech-bubble" id="angel-text"></div>
        <svg width="80" height="80" viewBox="0 0 100 100">
            <circle cx="50" cy="30" r="15" fill="#fff" />
            <path d="M50 45 L20 90 L80 90 Z" fill="#fff" />
            <ellipse cx="50" cy="10" rx="25" ry="6" fill="none" stroke="#ffd700" stroke-width="3" />
        </svg>
    </div>

    <div id="demon-box" class="character-container">
        <div class="speech-bubble" id="demon-text"></div>
        <svg width="80" height="80" viewBox="0 0 100 100">
            <circle cx="50" cy="55" r="30" fill="#ef4444" />
            <path d="M35 25 L30 5 M65 25 L70 5" stroke="#000" stroke-width="4" />
            <path d="M40 50 L45 50 M55 50 L60 50" stroke="#000" stroke-width="3" />
        </svg>
    </div>

    <script>
        const questions = [
            { q: "Quem liderou o povo de Israel na saída do Egito?", a: ["Abraão", "Moisés", "Josué", "Davi"], c: 1, hints: ["O libertador no Mar Vermelho", "Usou um cajado"], troll: "Foi Abraão, ele era o pai da fé!" },
            { q: "Quem construiu a arca para o dilúvio?", a: ["Abraão", "Moisés", "Noé", "Elias"], c: 2, hints: ["Animais em pares", "Choveu 40 dias"], troll: "Moisés abria o mar, fazer barco era com ele!" },
            { q: "Qual gigante foi derrotado por Davi?", a: ["Golias", "Sansão", "Saul", "Herodes"], c: 0, hints: ["Um gigante filisteu", "Uma pedra na testa"], troll: "Sansão era o mais forte, ele que vencia gigantes!" },
            { q: "Quem foi lançado na cova dos leões?", a: ["Daniel", "Elias", "Isaías", "Jeremias"], c: 0, hints: ["Orava 3 vezes ao dia", "Na Babilônia"], troll: "Elias subiu num carro de fogo, os leões nem o viam!" },
            { q: "Quem recebeu os Dez Mandamentos?", a: ["Josué", "Moisés", "Abraão", "Samuel"], c: 1, hints: ["No Monte Sinai", "Tabelas de pedra"], troll: "Abraão estava no monte, deve ter sido ele!" },
            { q: "Primeiro homem criado por Deus:", a: ["Noé", "Adão", "Abraão", "Jacó"], c: 1, hints: ["Viveu no Éden", "Feito do pó"], troll: "Noé recomeçou tudo, foi o primeiro de todos!" },
            { q: "Quem foi engolido por um grande peixe?", a: ["Jonas", "Pedro", "Paulo", "Elias"], c: 0, hints: ["Fugiu para Társis", "3 dias no ventre"], troll: "Pedro era pescador, ele que lidava com peixes!" },
            { q: "Rei conhecido por sua sabedoria:", a: ["Davi", "Saul", "Salomão", "Josias"], c: 2, hints: ["Filho de Davi", "Pediu sabedoria"], troll: "Davi era o ungido, a sabedoria era dele!" },
            { q: "Quantos discípulos Jesus escolheu?", a: ["10", "11", "12", "13"], c: 2, hints: ["Como as tribos de Israel", "O grupo principal"], troll: "Eram 13 na Santa Ceia! Conte bem!" },
            { q: "Quem traiu Jesus por 30 moedas?", a: ["Pedro", "Judas Iscariotes", "João", "Mateus"], c: 1, hints: ["Identificou com um beijo", "O tesoureiro"], troll: "Pedro negou Cristo, traição e negação dá no mesmo!" },
            { q: "Onde Jesus nasceu?", a: ["Nazaré", "Jerusalém", "Belém", "Cafarnaum"], c: 2, hints: ["Cidade de Davi", "Numa manjedoura"], troll: "Jesus o Nazareno? Nasceu em Nazaré!" },
            { q: "Quem negou Jesus três vezes?", a: ["João", "Pedro", "Tomé", "Tiago"], c: 1, hints: ["O galo cantou", "Disse que não O conhecia"], troll: "Tomé duvidava de tudo, deve ter sido ele!" },
            { q: "Apóstolo que era cobrador de impostos:", a: ["Mateus", "Pedro", "André", "Filipe"], c: 0, hints: ["Também chamado Levi", "Escreveu o 1º Evangelho"], troll: "André era o irmão negociante, cuidava das moedas!" },
            { q: "Primeiro mártir cristão:", a: ["Paulo", "Estêvão", "Pedro", "Tiago"], c: 1, hints: ["Apedrejado", "Viu os céus abertos"], troll: "Paulo sofreu em naufrágios, foi o primeiro mártir!" },
            { q: "Duvidou da ressurreição de Cristo:", a: ["Tomé", "João", "André", "Filipe"], c: 0, hints: ["Quis tocar nas feridas", "Só creu vendo"], troll: "João era muito jovem e não acreditou de cara!" },
            { q: "Escreveu a maioria das Epístolas:", a: ["Pedro", "Paulo", "João", "Tiago"], c: 1, hints: ["Caiu do cavalo", "Apóstolo dos gentios"], troll: "João escreveu o Apocalipse, foi ele quem mais escreveu!" },
            { q: "Quem batizou Jesus no rio Jordão?", a: ["Pedro", "João Batista", "Paulo", "Tiago"], c: 1, hints: ["Voz no deserto", "Comia gafanhotos"], troll: "Pedro era o líder e batizava todo mundo!" },
            { q: "Quem substituiu Judas Iscariotes?", a: ["Barnabé", "Matias", "Timóteo", "Silas"], c: 1, hints: ["Sorteado entre dois", "Atos 1"], troll: "Barnabé era o melhor amigo de Paulo, ele entrou!" },
            { q: "Quem parou o Sol em uma batalha?", a: ["Moisés", "Josué", "Gideão", "Sansão"], c: 1, hints: ["Na batalha de Gibeão", "Sucessor de Moisés"], troll: "Moisés parava águas, parar o sol era fácil pra ele!" },
            { q: "A mulher de Ló virou estátua de quê?", a: ["Pedra", "Sal", "Ouro", "Areia"], c: 1, hints: ["Olhou para trás", "Fuga de Sodoma"], troll: "Estavam no deserto, ela virou areia fina!" }
        ];

        let currentQuestion = 0;
        let score = 0;
        let lives = 3;
        let combo = 0;
        let timer;
        let timeLeft;
        let isProcessing = false;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            initEnvironment();
            loadQuestion();
            
            setInterval(() => {
                if(!isProcessing && Math.random() > 0.6) {
                    Math.random() > 0.5 ? showDemon() : showAngel(timeLeft < 5);
                }
            }, 6000);
        }

        function loadQuestion() {
            if(currentQuestion >= questions.length || lives <= 0) return endGame();
            
            isProcessing = false;
            const q = questions[currentQuestion];
            document.getElementById('question-count').innerHTML = `${(currentQuestion + 1).toString().padStart(2, '0')} <span class="text-slate-500">/ ${questions.length}</span>`;
            
            const baseLimit = 15;
            const currentLimit = Math.max(5, baseLimit - (currentQuestion * 0.5));
            
            document.getElementById('timer-bar').classList.toggle('timer-danger', currentLimit < 7);
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-fill').style.width = `${(currentQuestion / questions.length) * 100}%`;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option p-4 sm:p-6 rounded-xl text-sm sm:text-lg font-bold text-left border border-white/5 active:bg-blue-600 transition-colors';
                btn.innerText = opt;
                btn.onclick = (e) => checkAnswer(idx, e);
                grid.appendChild(btn);
            });

            startTimer(currentLimit);
            hideCharacters();
        }

        function startTimer(limit) {
            clearInterval(timer);
            timeLeft = limit;
            const bar = document.getElementById('timer-bar');
            
            timer = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / limit) * 100;
                bar.style.width = percentage + '%';
                
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    handleFailure();
                }
            }, 100);
        }

        function checkAnswer(idx, e) {
            if(isProcessing) return;
            isProcessing = true;
            clearInterval(timer);

            const q = questions[currentQuestion];
            if(idx === q.c) {
                const points = 100 + Math.floor(timeLeft * 10) + (combo * 20);
                score += points;
                combo++;
                document.getElementById('score').innerText = score.toString().padStart(4, '0');
                
                const rect = e.target.getBoundingClientRect();
                spawnFloatingText(rect.left + rect.width/2, rect.top, `+${points}`, '#fbbf24');
                
                updateCombo();
                currentQuestion++;
                setTimeout(loadQuestion, 500);
            } else {
                handleFailure(e);
            }
        }

        function handleFailure(e) {
            lives--;
            combo = 0;
            updateLives();
            updateCombo();
            
            document.body.classList.add('shake-screen');
            setTimeout(() => document.body.classList.remove('shake-screen'), 400);
            
            if(e) {
                const rect = e.target.getBoundingClientRect();
                spawnFloatingText(rect.left + rect.width/2, rect.top, "ERROU!", '#ef4444');
            }

            if(lives <= 0) {
                setTimeout(endGame, 600);
            } else {
                currentQuestion++;
                setTimeout(loadQuestion, 1000);
            }
        }

        function spawnFloatingText(x, y, text, color) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function updateLives() {
            const hearts = document.querySelectorAll('.life-heart');
            hearts.forEach((h, i) => { if(i >= lives) h.classList.add('life-lost'); });
        }

        function updateCombo() {
            const badge = document.getElementById('combo-badge');
            if(combo >= 2) {
                badge.style.opacity = '1';
                badge.style.transform = 'scale(1)';
                document.getElementById('combo-val').innerText = combo;
            } else {
                badge.style.opacity = '0';
                badge.style.transform = 'scale(0.5)';
            }
        }

        function showAngel(urgent) {
            if(isProcessing) return;
            const q = questions[currentQuestion];
            document.getElementById('angel-text').innerText = urgent ? `Rápido! É ${q.hints[0]}!` : `Dica: ${q.hints[0]}.`;
            document.getElementById('angel-box').classList.add('active');
            setTimeout(hideCharacters, 4000);
        }

        function showDemon() {
            if(isProcessing) return;
            document.getElementById('demon-text').innerText = questions[currentQuestion].troll;
            document.getElementById('demon-box').classList.add('active');
            setTimeout(hideCharacters, 4000);
        }

        function hideCharacters() {
            document.getElementById('angel-box').classList.remove('active');
            document.getElementById('demon-box').classList.remove('active');
        }

        function initEnvironment() {
            const layer = document.getElementById('weather-layer');
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'absolute bg-white rounded-full pointer-events-none opacity-20';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-10px';
                p.style.width = '2px';
                p.style.height = '2px';
                layer.appendChild(p);
                p.animate([{ transform: 'translateY(0)' }, { transform: 'translateY(110vh)' }], { duration: 4000 });
                setTimeout(() => p.remove(), 4000);
            }, 300);
        }

        function endGame() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            const msg = document.getElementById('final-message');
            if(lives <= 0) msg.innerText = "Sua jornada parou aqui. Estude mais a Bíblia!";
            else if(score > 3000) msg.innerText = "Incrível! Você é um verdadeiro mestre das escrituras!";
            else msg.innerText = "Boa jornada! Mas ainda há muito o que aprender.";
        }
    </script>
</body>
</html>
