<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jornada da Fé - Edição Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #fbbf24;
            --holy-blue: #38bdf8;
            --hell-fire: #ef4444;
            --divine-purple: #a855f7;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            user-select: none;
            touch-action: none;
        }
        
        @media (min-width: 1024px) {
            body { cursor: none; }
            #custom-cursor { display: block; }
        }
        @media (max-width: 1023px) {
            #custom-cursor { display: none; }
        }

        .font-ancient { font-family: 'Cinzel', serif; }

        #particle-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        #custom-cursor {
            position: fixed;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 20px 5px var(--gold);
            transition: transform 0.1s;
        }

        .glass {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            /* Ajuste para rolagem interna */
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        /* Scrollbar customizada para o card */
        #game-content {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) transparent;
            -webkit-overflow-scrolling: touch;
            padding-right: 4px;
        }

        #game-content::-webkit-scrollbar {
            width: 4px;
        }
        #game-content::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .glitch-active {
            animation: glitch 0.2s infinite;
            filter: hue-rotate(90deg) contrast(1.5);
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        .angel-float { animation: angelFloat 5s ease-in-out infinite; }
        @keyframes angelFloat {
            0%, 100% { transform: translateY(0) scale(1) rotate(-3deg); }
            50% { transform: translateY(-15px) scale(1.05) rotate(3deg); }
        }

        .btn-divine {
            background: linear-gradient(135deg, #78350f 0%, #fbbf24 100%);
            box-shadow: 0 4px 0 #451a03, 0 10px 20px rgba(251, 191, 36, 0.3);
            transition: all 0.2s;
        }
        .btn-divine:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #451a03;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1e293b;
            transition: all 0.5s;
        }
        .progress-dot.active {
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold);
            transform: scale(1.3);
        }

        .animate-in { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .victory-glow {
            animation: victoryGlow 3s ease-in-out infinite alternate;
        }
        @keyframes victoryGlow {
            from { filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.3)); }
            to { filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.8)); }
        }

        .aura-gold {
            box-shadow: 0 0 25px 5px rgba(251, 191, 36, 0.6);
            border: 2px solid var(--gold) !important;
        }

        .bible-verse {
            border-left: 2px solid var(--gold);
            padding-left: 1rem;
            margin: 1.5rem 0;
            font-size: 0.85rem;
            color: #d1d5db;
            text-align: left;
        }

        .challenge-badge {
            background: linear-gradient(to right, transparent, rgba(251, 191, 36, 0.1), transparent);
            border-top: 1px solid rgba(251, 191, 36, 0.3);
            border-bottom: 1px solid rgba(251, 191, 36, 0.3);
            padding: 8px 0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 min-h-screen">

    <canvas id="particle-canvas"></canvas>
    <div id="custom-cursor"></div>
    <div class="fixed inset-0 bg-[radial-gradient(circle_at_center,rgba(30,58,138,0.15)_0%,transparent_100%)] pointer-events-none"></div>

    <!-- Timeline Superior -->
    <div class="fixed top-4 sm:top-8 left-1/2 -translate-x-1/2 flex items-center gap-3 z-50 bg-black/60 px-4 py-2 rounded-full border border-white/5 backdrop-blur-md max-w-[90vw]">
        <span class="text-[7px] sm:text-[8px] font-black text-amber-500 uppercase whitespace-nowrap">Caminho da Fé</span>
        <div id="timeline" class="flex gap-1.5 sm:gap-2"></div>
    </div>

    <!-- Anjo -->
    <div class="fixed top-6 right-6 z-[100] text-center hidden sm:block">
        <div id="angel-bubble" class="absolute -left-44 top-0 bg-white text-slate-900 px-4 py-2 rounded-2xl text-[10px] font-bold w-36 shadow-2xl opacity-0 transition-all scale-75">
            Deus te abençoe!
        </div>
        <div class="text-6xl sm:text-8xl angel-float drop-shadow-[0_0_20px_rgba(255,255,255,0.4)]">👼</div>
    </div>

    <!-- Modal do Criador -->
    <div id="creator-modal" class="fixed inset-0 bg-black/98 z-[2000] hidden items-center justify-center p-6 backdrop-blur-2xl">
        <div class="text-center space-y-6 animate-in w-full max-sm">
            <div class="text-6xl">🎨</div>
            <h2 class="text-3xl sm:text-4xl font-ancient text-amber-500 uppercase tracking-tighter">O Criador</h2>
            <div class="text-white space-y-2">
                <p class="text-[10px] uppercase tracking-widest text-slate-500">Inspirado pela palavra por</p>
                <p class="text-4xl sm:text-5xl font-black text-white drop-shadow-[0_0_15px_rgba(251,191,36,0.5)]">ESLEY AUGUSTO</p>
            </div>
            <button onclick="toggleCreator()" class="w-full text-amber-500 border border-amber-500/30 py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest active:bg-amber-500 active:text-black transition-all">Voltar ao Caminho</button>
        </div>
    </div>

    <!-- Card Principal -->
    <div id="main-card" class="z-10 w-full max-w-xl glass p-6 sm:p-10 rounded-[2.5rem] sm:rounded-[4rem] relative transition-all duration-700 opacity-0 translate-y-6">
        
        <!-- Header da UI -->
        <div class="flex flex-col sm:flex-row justify-between items-center sm:items-start mb-6 sm:mb-10 border-b border-white/10 pb-6 sm:pb-8 gap-6 shrink-0">
            <div class="flex flex-col items-center sm:items-start gap-4 w-full sm:w-auto">
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">Caminhante da Fé</span>
                <div class="flex gap-2" id="inventory">
                    <div id="item-shield" class="w-10 h-10 sm:w-12 sm:h-12 bg-white/5 rounded-xl flex items-center justify-center opacity-20 grayscale transition-all">🛡️</div>
                    <div id="item-sword" class="w-10 h-10 sm:w-12 sm:h-12 bg-white/5 rounded-xl flex items-center justify-center opacity-20 grayscale transition-all">⚔️</div>
                    <div id="item-helmet" class="w-10 h-10 sm:w-12 sm:h-12 bg-white/5 rounded-xl flex items-center justify-center opacity-20 grayscale transition-all">🪖</div>
                </div>
            </div>
            
            <div class="w-full sm:w-auto text-center sm:text-right">
                <div class="mb-4">
                    <p class="text-[8px] font-black text-slate-500 uppercase mb-2 tracking-widest">Resistência da Alma</p>
                    <div class="w-full sm:w-40 h-3 bg-black/50 rounded-full p-0.5 border border-white/5 overflow-hidden mx-auto">
                        <div id="hp-bar" class="h-full bg-gradient-to-r from-red-600 to-green-400 transition-all duration-700" style="width: 100%"></div>
                    </div>
                </div>
                <div class="flex justify-center sm:justify-end gap-2 text-[9px] font-black text-amber-500">
                    <span id="level-counter">INÍCIO</span>
                    <span>/</span>
                    <span id="total-levels">6</span>
                </div>
            </div>
        </div>

        <div id="game-content" class="flex-grow flex flex-col">
            <!-- Injetado Dinamicamente -->
        </div>

    </div>

    <script>
        // Sistema de Partículas
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.life = 1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                this.life -= 0.015;
            }
            draw() {
                pCtx.globalAlpha = this.life;
                pCtx.fillStyle = this.color;
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                pCtx.fill();
            }
        }

        function handleParticles() {
            pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(handleParticles);
        }
        handleParticles();

        const triggerParticles = (x, y, color, count = 1) => {
            for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
        };

        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('custom-cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if(Math.random() > 0.8) triggerParticles(e.clientX, e.clientY, '#fbbf24');
        });

        document.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            triggerParticles(touch.clientX, touch.clientY, '#fff', 10);
            const bubble = document.getElementById('angel-bubble');
            bubble.style.opacity = '1';
            bubble.style.transform = 'scale(1)';
            setTimeout(() => {
                bubble.style.opacity = '0';
                bubble.style.transform = 'scale(0.75)';
            }, 2000);
        });

        let state = {
            hp: 100,
            current: 0,
            mistakes: 0,
            items: [],
            isDead: false
        };

        const levels = [
            {
                title: "O CHAMADO DE NOÉ",
                visual: "🐋",
                text: "Noé recebeu a ordem de Deus para construir a arca. Quantos animais de cada espécie impura ele deveria levar?",
                options: [
                    { t: "Sete casais", c: false, m: "Esse foi para os animais limpos!" },
                    { t: "Um casal", c: true, m: "Fé preservada!" },
                    { t: "Nenhum", c: false, m: "Todos foram chamados!" }
                ],
                item: 'shield'
            },
            {
                title: "O MAR VERMELHO",
                visual: "🌊",
                text: "Com o exército egípcio atrás, Deus abriu um caminho por qual mar?",
                options: [
                    { t: "Mar Morto", c: false, m: "Lá o sal é muito forte!" },
                    { t: "Mar Vermelho", c: true, m: "As águas se abriram!" },
                    { t: "Mar da Galileia", c: false, m: "Onde Jesus caminhou." }
                ],
                item: null
            },
            {
                title: "BABEL",
                visual: "🧱",
                text: "Para impedir a construção da torre, o que Deus confundiu?",
                options: [
                    { t: "Os mapas", c: false, m: "Eles sabiam o caminho." },
                    { t: "As línguas", c: true, m: "Ninguém mais se entendia!" },
                    { t: "As ferramentas", c: false, m: "A mente foi confundida." }
                ],
                item: 'helmet'
            },
            {
                title: "OS SONHOS DE JOSÉ",
                visual: "🌾",
                text: "No sonho do Faraó, o que representavam as sete vacas magras?",
                options: [
                    { t: "Sete anos de fome", c: true, m: "Mas José guardou mantimentos!" },
                    { t: "Sete anos de guerra", c: false, m: "A paz reinava no Egito." },
                    { t: "Sete pragas", c: false, m: "Isso veio com Moisés." }
                ],
                item: 'sword'
            },
            {
                title: "JERICÓ",
                visual: "🎺",
                text: "Quantas vezes o povo rodeou Jericó no último dia?",
                options: [
                    { t: "Uma vez", c: false, m: "Não foi o suficiente!" },
                    { t: "Três vezes", c: false, m: "Precisava de mais fé." },
                    { t: "Sete vezes", c: true, m: "E os muros caíram!" }
                ],
                item: null
            },
            {
                title: "A SABEDORIA",
                visual: "💎",
                text: "O que Salomão pediu a Deus quando se tornou rei?",
                options: [
                    { t: "Riquezas", c: false, m: "Ele ganhou isso depois." },
                    { t: "Sabedoria", c: true, m: "O melhor pedido possível!" },
                    { t: "Vitória na guerra", c: false, m: "Deus lhe deu paz." }
                ],
                item: null
            }
        ];

        function initTimeline() {
            const container = document.getElementById('timeline');
            container.innerHTML = '';
            levels.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `progress-dot ${i <= state.current ? 'active' : ''}`;
                container.appendChild(dot);
            });
        }

        window.onload = () => {
            document.getElementById('main-card').style.opacity = '1';
            document.getElementById('main-card').style.transform = 'translateY(0)';
            renderStart();
            initTimeline();
        };

        function renderStart() {
            const view = document.getElementById('game-content');
            view.innerHTML = `
                <div class="text-center space-y-4 animate-in py-4">
                    <div class="text-[80px] sm:text-[100px] drop-shadow-2xl mb-2">✨</div>
                    
                    <div class="challenge-badge">
                        <span class="text-amber-500 font-ancient font-black text-2xl sm:text-3xl uppercase tracking-[0.2em] drop-shadow-[0_0_10px_rgba(251,191,36,0.5)]">
                            TE DESAFIO
                        </span>
                    </div>

                    <div class="space-y-1">
                        <h1 class="text-4xl sm:text-6xl font-black text-white font-ancient tracking-tighter leading-none">JORNADA DA FÉ</h1>
                        <p class="text-slate-400 text-[10px] sm:text-xs tracking-[0.3em] uppercase">Prove seu conhecimento bíblico</p>
                    </div>
                    
                    <div class="flex flex-col gap-4 mt-8 pb-4">
                        <button onclick="nextLevel()" class="btn-divine w-full py-5 rounded-3xl text-slate-900 font-black text-xl sm:text-2xl uppercase tracking-[0.2em]">
                            Entrar no Templo
                        </button>
                        
                        <button onclick="toggleCreator()" class="w-full py-3 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black text-amber-500/80 uppercase tracking-widest hover:bg-white/10 active:scale-95 transition-all">
                            Ver Créditos
                        </button>
                    </div>
                </div>
            `;
        }

        function nextLevel() {
            if(state.current >= levels.length) {
                renderBoss();
                return;
            }
            const level = levels[state.current];
            const view = document.getElementById('game-content');
            document.getElementById('level-counter').innerText = `PROVA ${state.current + 1}`;
            initTimeline();

            view.innerHTML = `
                <div class="space-y-6 sm:space-y-8 animate-in py-4">
                    <div class="text-center">
                        <div class="text-6xl sm:text-8xl mb-2">${level.visual}</div>
                        <h2 class="text-amber-500 font-ancient text-lg sm:text-xl uppercase tracking-widest">${level.title}</h2>
                    </div>
                    <p class="text-center text-xl sm:text-2xl font-bold leading-snug px-2 text-slate-100">${level.text}</p>
                    <div class="grid gap-3" id="options"></div>
                    <div id="feedback" class="h-6 text-center text-[10px] font-black uppercase tracking-widest italic opacity-0 transition-opacity pb-4"></div>
                </div>
            `;

            const opts = document.getElementById('options');
            level.options.forEach(o => {
                const b = document.createElement('button');
                b.className = "bg-white/5 border border-white/10 p-4 sm:p-5 rounded-2xl text-left active:bg-amber-500/20 transition-all font-bold text-sm sm:text-base flex justify-between group touch-manipulation";
                b.innerHTML = `<span>${o.t}</span> <span class="opacity-0 group-hover:opacity-100 transition-opacity">✨</span>`;
                b.onclick = () => handleChoice(o);
                opts.appendChild(b);
            });
            // Reset scroll position to top on each level
            view.scrollTop = 0;
        }

        function handleChoice(opt) {
            const fb = document.getElementById('feedback');
            fb.style.opacity = '1';
            if(opt.c) {
                fb.innerText = opt.m;
                fb.className = "h-6 text-center text-[10px] font-black uppercase tracking-widest italic text-green-400 animate-pulse";
                if(levels[state.current].item) unlockItem(levels[state.current].item);
                setTimeout(() => { state.current++; nextLevel(); }, 1200);
            } else {
                fb.innerText = opt.m;
                fb.className = "h-6 text-center text-[10px] font-black uppercase tracking-widest italic text-red-500";
                state.hp -= 20;
                state.mistakes++;
                updateStats();
                triggerGlitch();
            }
        }

        function unlockItem(id) {
            const el = document.getElementById(`item-${id}`);
            el.style.opacity = '1';
            el.style.filter = 'grayscale(0)';
            el.classList.add('bg-amber-500/20', 'border-amber-500/50', 'border');
            state.items.push(id);
            if(state.items.length === 3) {
                document.getElementById('inventory').classList.add('aura-gold', 'p-1', 'rounded-2xl', 'transition-all');
            }
        }

        function updateStats() {
            document.getElementById('hp-bar').style.width = state.hp + '%';
            if(state.hp <= 0) {
                document.getElementById('game-content').innerHTML = `
                    <div class='text-center space-y-6 animate-in py-10'>
                        <div class="text-7xl">🌑</div>
                        <h1 class='text-red-600 text-4xl font-ancient'>A FÉ FRAQUEJOU</h1>
                        <p class="text-slate-400 text-xs">Não desista, o caminho é estreito!</p>
                        <button onclick='location.reload()' class='w-full py-4 bg-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest'>Tentar de Novo</button>
                    </div>`;
            }
        }

        function renderBoss() {
            const view = document.getElementById('game-content');
            view.innerHTML = `
                <div class="text-center space-y-8 animate-in py-6">
                    <div class="text-8xl glitch-active">👹</div>
                    <h2 class="text-2xl font-ancient text-red-600 uppercase">Provação Final</h2>
                    <p class="text-slate-400 text-xs uppercase tracking-widest">Vença a dúvida com a esperança!</p>
                    <div class="w-full bg-red-900/20 h-2 rounded-full overflow-hidden">
                        <div id="boss-hp" class="bg-red-600 h-full transition-all duration-300 shadow-[0_0_10px_red]" style="width: 100%"></div>
                    </div>
                    <button onclick="bossBattle()" class="btn-divine w-full py-5 rounded-2xl text-slate-900 font-black text-xl mb-4">BRANDIR A ESPERANÇA</button>
                </div>
            `;
            view.scrollTop = 0;
        }

        let bHP = 100;
        function bossBattle() {
            bHP -= 34;
            document.getElementById('boss-hp').style.width = bHP + '%';
            triggerGlitch();
            if(bHP <= 0) renderFinal();
        }

        function renderFinal() {
            document.body.style.background = "radial-gradient(circle, #4c1d95 0%, #020617 100%)";
            const view = document.getElementById('game-content');
            const mistakesColor = state.mistakes === 0 ? 'text-green-400' : 'text-amber-500';

            view.innerHTML = `
                <div class="text-center space-y-6 animate-in pb-10 pt-4">
                    <div class="text-8xl victory-glow">👑</div>
                    
                    <div class="space-y-1">
                        <h1 class="text-4xl sm:text-5xl font-ancient text-amber-500 leading-tight">VITÓRIA DIVINA!</h1>
                        <p class="text-[9px] uppercase tracking-[0.3em] text-slate-400">Obrigado por completar a jornada</p>
                    </div>

                    <div class="bg-white/5 p-6 rounded-3xl border border-white/10 backdrop-blur-sm relative overflow-hidden">
                        <div class="text-4xl mb-4 relative z-10">🙏</div>
                        
                        <div class="bible-verse relative z-10 italic">
                            "Porque sou eu que conheço os planos que tenho para vocês, diz o Senhor, planos de fazê-los prosperar e não de causar dano, planos de dar a vocês esperança e um futuro."
                            <br><span class="font-bold text-amber-500 text-[10px] mt-1 block">— Jeremias 29:11</span>
                        </div>

                        <p class="text-lg font-bold italic leading-snug mb-4 relative z-10">
                            "Esta pequena jornada foi criada para lembrar que cada obstáculo superado fortalece sua fé. 
                            Saiba que você é especial e que Deus tem um futuro brilhante reservado para sua vida. 
                            Continue firme no propósito!"
                        </p>
                        
                        <div class="h-px w-10 bg-amber-500/30 mx-auto my-2 relative z-10"></div>
                        <p class="text-[10px] text-slate-500 uppercase font-black relative z-10">Com amor e fé</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                            <p class="text-[7px] uppercase font-black text-slate-500 mb-1">Status Final</p>
                            <p class="text-lg font-bold text-green-400">Aprovado(a)</p>
                        </div>
                        <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                            <p class="text-[7px] uppercase font-black text-slate-500 mb-1">Erros</p>
                            <p class="text-lg font-bold ${mistakesColor}">${state.mistakes}</p>
                        </div>
                    </div>

                    <div class="pt-2 pb-6">
                        <button onclick="window.location.reload()" class="w-full py-4 rounded-2xl bg-amber-500/10 border border-amber-500/20 text-amber-500 text-[10px] font-black uppercase tracking-widest">
                            Refazer a Jornada
                        </button>
                    </div>
                </div>
            `;
            view.scrollTop = 0;
            for(let i=0; i<50; i++) triggerParticles(window.innerWidth/2, window.innerHeight/2, '#fbbf24', 1);
        }

        function triggerGlitch() {
            document.body.classList.add('glitch-active');
            setTimeout(() => document.body.classList.remove('glitch-active'), 400);
        }

        function toggleCreator() {
            const m = document.getElementById('creator-modal');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }
    </script>
</body>
</html>
